<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المهندس إبراهيم</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;}

body {
  font-family: Tahoma;
  background: #0b1120;
  color: white;
}

/* NAVBAR */
nav {
  position: fixed;
  width: 100%;
  top: 0;
  background: rgba(15,23,42,0.9);
  backdrop-filter: blur(10px);
  padding: 15px;
  text-align: center;
  z-index: 1000;
}

nav a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
  font-weight: bold;
}

/* HERO */
header {
  height: 100vh;
  background: url('image1.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

header h1 {
  font-size: 50px;
  background: linear-gradient(to left,#60a5fa,#e2e8f0);
  -webkit-background-clip: text;
  color: transparent;
}

header p {
  margin-top: 10px;
  font-size: 20px;
}

/* SECTIONS */
section {
  padding: 80px 20px;
  text-align: center;
}

.container {
  max-width: 1100px;
  margin: auto;
}

/* ABOUT */
.about img {
  width: 250px;
  border-radius: 15px;
  margin-bottom: 20px;
}

/* PROJECTS */
.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px;
}

.projects img {
  width: 100%;
  border-radius: 15px;
  transition: 0.3s;
}

.projects img:hover {
  transform: scale(1.05);
}

/* CONTACT */
.contact {
  background: #1e293b;
}

iframe {
  width: 100%;
  height: 300px;
  border: 0;
  border-radius: 10px;
}

/* WHATSAPP FLOAT */
.whatsapp {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
  text-decoration: none;
  color: white;
}

/* ANIMATION */
.fade {
  opacity: 0;
  transform: translateY(20px);
  transition: 1s;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
  <a href="#">الرئيسية</a>
  <a href="#about">من أنا</a>
  <a href="#projects">أعمالي</a>
  <a href="#contact">تواصل</a>
</nav>

<!-- HERO -->
<header>
  <div>
    <h1>Engineer Ibrahim</h1>
    <p>مهندس مدني | تصميم - إشراف - تنفيذ</p>
  </div>
</header>

<!-- ABOUT -->
<section id="about" class="fade">
  <div class="container about">
    <img src="image2.jpg">
    <h2>من أنا</h2>
    <p>مهندس مدني محترف أمتلك خبرة في التصميم الهندسي والإشراف على المشاريع وتنفيذ الأعمال الإنشائية بأعلى جودة.</p>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects" class="fade">
  <div class="container">
    <h2>أعمالي</h2>
    <div class="projects">
      <img src="https://via.placeholder.com/400x300">
      <img src="https://via.placeholder.com/400x300">
      <img src="https://via.placeholder.com/400x300">
    </div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="contact fade">
  <div class="container">
    <h2>تواصل معي</h2>
    <p>📞 +967 770284917</p>

    <iframe src="https://maps.google.com/maps?q=Aden&t=&z=13&output=embed"></iframe>
  </div>
</section>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/967770284917">💬</a>

<script>
const elements = document.querySelectorAll(".fade");

window.addEventListener("scroll", () => {
  elements.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      el.classList.add("show");
    }
  });
});
</script>

</body>
</html>
